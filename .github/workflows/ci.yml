name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0

      - name: Check formatting with Prettier
        run: npm run format:check

  branch-name:
    name: Branch Naming Convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          ALLOWED="^(main|develop|staging|(hotfix|release)/.+)$"
          REQUIRED="^TESIS-[0-9]+-[a-z0-9-]+$"

          if echo "$BRANCH" | grep -qE "$ALLOWED"; then
            echo "✅ Branch '$BRANCH' matches allowed special branches."
            exit 0
          fi

          if echo "$BRANCH" | grep -qE "$REQUIRED"; then
            echo "✅ Branch '$BRANCH' matches the TESIS-XXX-description format."
            exit 0
          fi

          echo ""
          echo "❌ Branch name '$BRANCH' does not follow the naming convention."
          echo "   Use the format: TESIS-<number>-short-description"
          echo "   Example:        TESIS-123-user-authentication"
          echo "   Allowed special branches: main, develop, staging, hotfix/*, release/*"
          echo ""
          exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
