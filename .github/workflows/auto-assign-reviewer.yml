name: Auto Assign Reviewer

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  assign-reviewer:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/github-script@v7
        with:
          # Usa el GITHUB_TOKEN del propio workflow (no requiere un PAT ni secret).
          # Elige un revisor de la lista del equipo, excluyendo al autor.
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // Pool de revisores del proyecto. Actualizar si cambia el equipo.
            // Se usa una lista explícita en lugar de listCollaborators porque el
            // GITHUB_TOKEN del workflow no devuelve de forma confiable a todos los
            // colaboradores del repo (p. ej. omite miembros con membresía privada).
            const REVIEWERS = ['LauAubert', 'TomasMartin2004'];

            // Si el PR ya tiene revisores pedidos, no hacemos nada.
            if (pr.requested_reviewers && pr.requested_reviewers.length > 0) {
              core.info('El PR ya tiene revisores asignados; se omite.');
              return;
            }

            const candidates = REVIEWERS.filter(login => login !== author);

            if (candidates.length === 0) {
              core.info('No hay revisores disponibles distintos del autor.');
              return;
            }

            const reviewer = candidates[Math.floor(Math.random() * candidates.length)];
            core.info(`Asignando revisor: ${reviewer}`);

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: pr.number,
                reviewers: [reviewer],
              });
            } catch (err) {
              // Best-effort: no fallar el check si la asignación falla.
              core.warning(`No se pudo asignar revisor: ${err.message}`);
            }
