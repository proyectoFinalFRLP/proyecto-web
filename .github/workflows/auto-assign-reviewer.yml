name: Auto Assign Reviewer

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  assign-reviewer:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/github-script@v7
        with:
          # Requiere un PAT con scope "read:org" guardado como secret ORG_TOKEN
          # Si el equipo es público, podés probar con github.token primero
          github-token: ${{ secrets.ORG_TOKEN }}
          script: |
            const org = context.repo.owner;
            const teamSlug = 'team';
            const prAuthor = context.payload.pull_request.user.login;

            // Obtener miembros del equipo
            const { data: members } = await github.rest.teams.listMembersInOrg({
              org,
              team_slug: teamSlug,
            });

            // Excluir al autor del PR
            const candidates = members
              .map(m => m.login)
              .filter(login => login !== prAuthor);

            if (candidates.length === 0) {
              console.log('No hay revisores disponibles (todos son el autor).');
              return;
            }

            // Elegir uno al azar
            const reviewer = candidates[Math.floor(Math.random() * candidates.length)];
            console.log(`Asignando revisor: ${reviewer}`);

            await github.rest.pulls.requestReviewers({
              owner: org,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: [reviewer],
            });
